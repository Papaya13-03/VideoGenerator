# Dev stack for VideoGenerator: API + render worker + Redis (queue/state) + MinIO (object storage).
# Postgres is added in Phase 2. Run: docker compose up --build
x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: Dockerfile
  volumes:
    - ./backend:/MoneyPrinterTurbo
  depends_on:
    - redis
    - minio
    - postgres
  environment:
    # Override config.toml values so api and worker share Redis + MinIO + Postgres inside the network.
    MPT_APP_REDIS_HOST: redis
    MPT_APP_ENABLE_REDIS: "true"
    MPT_APP_USE_ARQ: "true"
    MPT_STORAGE_BACKEND: s3
    MPT_STORAGE_S3_ENDPOINT_URL: http://minio:9000
    MPT_STORAGE_S3_BUCKET: videogenerator
    MPT_STORAGE_S3_ACCESS_KEY: minioadmin
    MPT_STORAGE_S3_SECRET_KEY: minioadmin
    MPT_DATABASE_URL: postgresql+psycopg2://vg:vgpass@postgres:5432/videogenerator
    MPT_JWT_SECRET: change-me-in-production

services:
  redis:
    image: redis:7-alpine
    container_name: vg-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: vg-postgres
    environment:
      POSTGRES_USER: vg
      POSTGRES_PASSWORD: vgpass
      POSTGRES_DB: videogenerator
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: vg-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    restart: always

  api:
    <<: *backend-build
    container_name: vg-api
    command: ["python3", "main.py"]
    ports:
      - "127.0.0.1:8080:8080"
    restart: always

  worker:
    <<: *backend-build
    container_name: vg-worker
    command: ["arq", "app.queue.worker.WorkerSettings"]
    restart: always

volumes:
  minio-data:
  pg-data:
