# Dev stack for VideoGenerator: API + render worker + Redis (queue/state) + MinIO (object storage).
# Postgres is added in Phase 2. Run: docker compose up --build
x-backend-build: &backend-build
  build:
    context: ./backend
    dockerfile: Dockerfile
  volumes:
    - ./backend:/MoneyPrinterTurbo
  depends_on:
    - redis
    - minio
    - postgres
  environment:
    # Override config.toml values so api and worker share Redis + MinIO + Postgres inside the network.
    MPT_APP_REDIS_HOST: redis
    MPT_APP_ENABLE_REDIS: "true"
    MPT_APP_USE_ARQ: "true"
    MPT_STORAGE_BACKEND: s3
    MPT_STORAGE_S3_ENDPOINT_URL: http://minio:9000
    # Browser-reachable endpoint used to sign download URLs (host-published MinIO port).
    MPT_STORAGE_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    MPT_STORAGE_S3_BUCKET: videogenerator
    MPT_STORAGE_S3_ACCESS_KEY: minioadmin
    MPT_STORAGE_S3_SECRET_KEY: minioadmin
    MPT_DATABASE_URL: postgresql+psycopg2://vg:vgpass@postgres:5432/videogenerator
    MPT_JWT_SECRET: change-me-in-production
    MPT_SECRET_KEY: change-me-too-for-key-encryption
    # Max seconds per render job before the worker aborts it. Raise for long/slow renders.
    MPT_JOB_TIMEOUT: "5400"

services:
  redis:
    image: redis:7-alpine
    container_name: vg-redis
    # Host port remapped to 6380 to avoid clashing with other local redis instances.
    # Internal services connect via "redis:6379" on the compose network (unaffected).
    ports:
      - "127.0.0.1:6380:6379"
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: vg-postgres
    environment:
      POSTGRES_USER: vg
      POSTGRES_PASSWORD: vgpass
      POSTGRES_DB: videogenerator
    # Host port remapped to 5434 to avoid clashing with other local postgres instances.
    # Internal services connect via "postgres:5432" on the compose network (unaffected).
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: vg-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    restart: always

  api:
    <<: *backend-build
    container_name: vg-api
    command: ["python3", "main.py"]
    ports:
      - "127.0.0.1:8080:8080"
    restart: always

  worker:
    <<: *backend-build
    container_name: vg-worker
    command: ["arq", "app.queue.worker.WorkerSettings"]
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vg-frontend
    # Browser-side calls go to the host-published API port.
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    restart: always

volumes:
  minio-data:
  pg-data:
